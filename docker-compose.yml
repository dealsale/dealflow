services:
  dealflow:
    build: .
    restart: unless-stopped
    env_file: .env
    volumes:
      - dealflow-data:/srv/data
    expose:
      - "3001"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  dealflow-data:
  caddy-data:
  caddy-config:
